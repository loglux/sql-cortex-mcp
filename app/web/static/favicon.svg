<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- DB cylinder base -->
  <ellipse cx="16" cy="24" rx="10" ry="3.5" fill="#1c2328" stroke="#57c4ff" stroke-width="1.2"/>
  <rect x="6" y="14" width="20" height="10" fill="#1c2328"/>
  <ellipse cx="16" cy="14" rx="10" ry="3.5" fill="#1c2328" stroke="#57c4ff" stroke-width="1.2"/>
  <line x1="6" y1="14" x2="6" y2="24" stroke="#57c4ff" stroke-width="1.2"/>
  <line x1="26" y1="14" x2="26" y2="24" stroke="#57c4ff" stroke-width="1.2"/>
  <!-- Middle ellipse (DB ring) -->
  <ellipse cx="16" cy="19" rx="10" ry="3.5" fill="none" stroke="#57c4ff" stroke-width="0.6" opacity="0.4"/>
  <!-- Neural branches (cortex) -->
  <circle cx="16" cy="7" r="3" fill="#0f1416" stroke="#7ef6c7" stroke-width="1.2"/>
  <circle cx="16" cy="7" r="1.2" fill="#7ef6c7"/>
  <!-- Dendrites -->
  <line x1="13" y1="7" x2="8" y2="4" stroke="#7ef6c7" stroke-width="0.8" opacity="0.7"/>
  <line x1="19" y1="7" x2="24" y2="4" stroke="#7ef6c7" stroke-width="0.8" opacity="0.7"/>
  <line x1="14.5" y1="5" x2="11" y2="2" stroke="#7ef6c7" stroke-width="0.8" opacity="0.5"/>
  <line x1="17.5" y1="5" x2="21" y2="2" stroke="#7ef6c7" stroke-width="0.8" opacity="0.5"/>
  <!-- Axon down to DB -->
  <line x1="16" y1="10" x2="16" y2="14" stroke="#7ef6c7" stroke-width="1" opacity="0.6"/>
  <!-- Synapse dots -->
  <circle cx="8" cy="4" r="1" fill="#7ef6c7" opacity="0.7"/>
  <circle cx="24" cy="4" r="1" fill="#7ef6c7" opacity="0.7"/>
  <circle cx="11" cy="2" r="0.8" fill="#7ef6c7" opacity="0.5"/>
  <circle cx="21" cy="2" r="0.8" fill="#7ef6c7" opacity="0.5"/>
</svg>
